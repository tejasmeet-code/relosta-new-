name: Set Netlify env from secrets and deploy

on:
  workflow_dispatch: {}

jobs:
  set-env-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Set Netlify env: VITE_SUPABASE_URL
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then echo "Missing VITE_SUPABASE_URL secret"; exit 1; fi
          netlify env:set VITE_SUPABASE_URL "$VITE_SUPABASE_URL" --site "$NETLIFY_SITE_ID"

      - name: Set Netlify env: VITE_SUPABASE_ANON_KEY
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then echo "Missing VITE_SUPABASE_ANON_KEY secret"; exit 1; fi
          netlify env:set VITE_SUPABASE_ANON_KEY "$VITE_SUPABASE_ANON_KEY" --site "$NETLIFY_SITE_ID"

      - name: Trigger Netlify deploy (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy --dir=dist --prod --site "$NETLIFY_SITE_ID"
